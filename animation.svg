<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="radialMaskGradient">
      <stop offset="0%" stop-color="white" />
      <stop offset="90%" stop-color="black" />
    </radialGradient>
    <mask id="gridMask">
      <rect width="800" height="300" fill="url(#radialMaskGradient)" />
    </mask>
  </defs>
  <style>
    @keyframes moveLeft {
      0%, 100% { y: 30; }
      25% { y: 120; }
      50% { y: 195; }
      75% { y: 90; }
    }
    @keyframes moveRight {
      0%, 100% { y: 120; }
      25% { y: 210; }
      50% { y: 90; }
      75% { y: 60; }
    }
    @keyframes moveBall {
      0% { cx: 46; cy: 60; }
      25% { cx: 754; cy: 240; }
      50% { cx: 46; cy: 225; }
      75% { cx: 754; cy: 90; }
      100% { cx: 46; cy: 60; }
    }
    .bg { fill: #000; }
    .grid { stroke: #00d2ff; stroke-width: 1; opacity: 0.2; }
    .paddle-left { fill: #00d2ff; filter: url(#glow); animation: moveLeft 8s ease-in-out infinite; }
    .paddle-right { fill: #ff4ec8; filter: url(#glow); animation: moveRight 8s ease-in-out infinite; }
    .ball { fill: #fff; filter: url(#glow); animation: moveBall 8s linear infinite; }
  </style>
  <rect width="800" height="300" class="bg" />
  <pattern id="gridPattern" width="80" height="80" patternUnits="userSpaceOnUse">
    <path d="M 80 0 L 0 0 0 80" fill="none" class="grid" />
  </pattern>
  <rect width="800" height="300" fill="url(#gridPattern)" mask="url(#gridMask)" />
  <rect x="30" width="10" height="60" class="paddle-left" />
  <rect x="760" width="10" height="60" class="paddle-right" />
  <circle r="6" class="ball" />
</svg>
