<svg width="800" height="300" viewBox="0 0 800 300"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <radialGradient id="radialMaskGradient">
      <stop offset="0%" stop-color="white" />
      <stop offset="90%" stop-color="black" />
    </radialGradient>

    <mask id="gridMask">
      <rect width="800" height="300" fill="url(#radialMaskGradient)" />
    </mask>
  </defs>

  <style>
    @keyframes moveLeft {
      0%, 100% { transform: translate(0px, 30px); }
      25% { transform: translate(0px, 120px); }
      50% { transform: translate(0px, 195px); }
      75% { transform: translate(0px, 90px); }
    }

    @keyframes moveRight {
      0%, 100% { transform: translate(0px, 120px); }
      25% { transform: translate(0px, 210px); }
      50% { transform: translate(0px, 90px); }
      75% { transform: translate(0px, 60px); }
    }

    @keyframes moveBall {
      0% { transform: translate(46px, 60px); }
      25% { transform: translate(754px, 240px); }
      50% { transform: translate(46px, 225px); }
      75% { transform: translate(754px, 90px); }
      100% { transform: translate(46px, 60px); }
    }

    .bg { fill: #000; }

    .grid {
      stroke: #00d2ff;
      stroke-width: 1;
      opacity: 0.2;
    }

    .paddle-left {
      fill: #00d2ff;
      filter: url(#glow);
      animation: moveLeft 8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: top left;
    }

    .paddle-right {
      fill: #ff4ec8;
      filter: url(#glow);
      animation: moveRight 8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: top left;
    }

    .ball {
      fill: #fff;
      filter: url(#glow);
      animation: moveBall 8s linear infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="300" class="bg" />

  <!-- Grid -->
  <pattern id="gridPattern" width="80" height="80" patternUnits="userSpaceOnUse">
    <path d="M 80 0 L 0 0 0 80" fill="none" class="grid" />
  </pattern>

  <rect width="800" height="300"
        fill="url(#gridPattern)"
        mask="url(#gridMask)" />

  <!-- Paddles -->
  <rect x="30" y="0" width="10" height="60" class="paddle-left" />
  <rect x="760" y="0" width="10" height="60" class="paddle-right" />

  <!-- Ball -->
  <circle r="6" cx="0" cy="0" class="ball" />

</svg>
