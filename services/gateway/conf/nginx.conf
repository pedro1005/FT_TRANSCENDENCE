user  www-data;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

# Load ModSecurity module
load_module /usr/lib/nginx/modules/ngx_http_modsecurity_module.so;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Upstream definitions for better load balancing and connection reuse
    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend_upstream {
        server backend:3000;
        keepalive 32;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name ${DOMAIN_NAME};

        # Enable ModSecurity
        modsecurity on;
        modsecurity_rules_file /etc/nginx/modsecurity/modsecurity.conf;

        # WebSocket configuration for Socket.IO - CRITICAL for game functionality
        # Must come BEFORE other routes
        location /socket.io/ {
            proxy_pass http://backend_upstream;
            
            # WebSocket upgrade headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeout settings
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            
            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # Backend API routes - IMPORTANT: Backend serves at /api/auth, so preserve /api
        location /api/ {
            proxy_pass http://backend_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js Hot Module Replacement (HMR) WebSocket - Development only
        location /_next/webpack-hmr {
            proxy_pass http://frontend_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            
            proxy_cache_bypass $http_upgrade;
        }

        # Next.js static files and assets
        location /_next/ {
            proxy_pass http://frontend_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Cache static assets
            proxy_cache_bypass $http_upgrade;
        }

        # Frontend - MUST be last to catch all other routes
        location / {
            proxy_pass http://frontend_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # For Next.js HMR (Hot Module Replacement) in development
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Deny access to hidden files (.git, .env, etc)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # Optional: Redirect HTTP to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name ${DOMAIN_NAME};
        return 301 https://$server_name$request_uri;
    }
}
